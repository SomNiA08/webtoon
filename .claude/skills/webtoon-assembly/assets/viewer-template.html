<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>웹툰 뷰어 — ep{NN}</title>
<!--
  세로 스크롤 웹툰 뷰어 템플릿 (단일 HTML, 외부 의존성 없음)
  사용법:
   1) 아래 META(제목/회차)와 PANELS 데이터 배열만 채운다.
   2) 패널은 위→아래 순서대로 배열한다(panel_001 → panel_050+).
   3) bubbles[].x/y 는 패널 좌상단 기준 백분율(0~100), w 는 말풍선 폭(%).
      type: dialogue | thought | shout | narration
      tail: none | left | right | up | down  (말풍선 꼬리가 가리키는 방향 = 화자 방향)
   4) 브라우저로 그대로 열어 검수한다.
-->
<style>
  :root {
    --max-w: 720px;          /* 모바일 우선 기준 폭 */
    --panel-gap: 0px;        /* 패널 이음새. 0=무봉제 연결, 양수=칸 분리 */
    --page-bg: #0e0e10;      /* 뷰어 바깥 배경 */
    --strip-bg: #ffffff;     /* 패널 스트립 배경(이미지 로드 전) */
    --bubble-fs: 17px;       /* 말풍선 기본 폰트 크기(가독성 기준) */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--page-bg);
    font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    color: #111;
    -webkit-text-size-adjust: 100%;
  }
  header.viewer-head {
    position: sticky; top: 0; z-index: 50;
    background: rgba(14,14,16,.92);
    color: #f5f5f7; text-align: center;
    padding: 10px 12px; font-size: 14px; letter-spacing: .02em;
    backdrop-filter: blur(6px);
  }
  header.viewer-head b { font-weight: 700; }
  .strip {
    max-width: var(--max-w);
    margin: 0 auto;
    background: var(--strip-bg);
    display: flex; flex-direction: column;
    gap: var(--panel-gap);
  }
  .panel { position: relative; line-height: 0; }
  .panel img {
    width: 100%; height: auto; display: block;
    background: #e9e9ee; /* 이미지 결손 시에도 칸 형태 유지 */
  }
  .panel .missing {
    line-height: 1.5; color: #b00020; background: #fff3f3;
    border: 2px dashed #b00020; text-align: center;
    padding: 48px 12px; font-size: 14px;
  }
  /* ---- 말풍선 오버레이 ---- */
  .bubble {
    position: absolute;
    line-height: 1.35;
    font-size: var(--bubble-fs);
    font-weight: 500;
    color: #111;
    padding: 9px 13px;
    border-radius: 18px;
    background: #fff;
    border: 2px solid #111;
    box-shadow: 0 1px 4px rgba(0,0,0,.18);
    word-break: keep-all;
    transform: translate(-50%, -50%); /* x,y = 말풍선 중심 */
    text-align: center;
    z-index: 5;
  }
  .bubble .tail {
    position: absolute; width: 0; height: 0;
  }
  /* 대사(기본) — 꼬리 삼각형 */
  .bubble.dialogue .tail.left   { left:-14px; top:60%; border:8px solid transparent; border-right-color:#111; }
  .bubble.dialogue .tail.right  { right:-14px; top:60%; border:8px solid transparent; border-left-color:#111; }
  .bubble.dialogue .tail.up     { top:-14px; left:50%; border:8px solid transparent; border-bottom-color:#111; }
  .bubble.dialogue .tail.down   { bottom:-14px; left:50%; border:8px solid transparent; border-top-color:#111; }
  /* 생각 — 점선 테두리, 둥근 구름 느낌 */
  .bubble.thought {
    border-style: dashed; border-radius: 26px; font-style: italic; color:#333;
  }
  /* 외침 — 두꺼운 테두리, 굵은 대문자감, 약간 기울임 */
  .bubble.shout {
    border-width: 3px; font-weight: 800; border-radius: 8px;
    background:#fffbe6; transform: translate(-50%,-50%) rotate(-2deg);
    text-transform: none; letter-spacing:.01em;
  }
  .bubble.shout .tail.left  { left:-16px; top:60%; border:9px solid transparent; border-right-color:#111; }
  .bubble.shout .tail.right { right:-16px; top:60%; border:9px solid transparent; border-left-color:#111; }
  /* 나레이션 — 사각 캡션 박스, 꼬리 없음 */
  .bubble.narration {
    border-radius: 4px; background: rgba(20,20,24,.86); color:#f7f7f7;
    border-color: rgba(255,255,255,.25); font-weight:600; text-align:left;
  }
  footer.viewer-foot {
    color:#9a9aa2; text-align:center; padding:28px 12px 60px;
    font-size:13px; max-width: var(--max-w); margin:0 auto;
  }
</style>
</head>
<body>
<header class="viewer-head"><b id="m-title">웹툰 제목</b> · <span id="m-ep">ep{NN}</span></header>
<main class="strip" id="strip" aria-label="webtoon vertical viewer"></main>
<footer class="viewer-foot" id="foot"></footer>

<script>
/* ===== META ===== */
const META = { title: "웹툰 제목", episode: "ep{NN}" };

/* ===== PANELS 데이터 (episode-compositor가 채운다) =====
   src 는 이 파일 기준 상대경로. bubbles 는 없으면 [] 또는 생략. */
const PANELS = [
  {
    src: "../../05_panels/ep{NN}/panel_001.png",
    alt: "panel 001",
    bubbles: [
      { type: "narration", text: "예시 나레이션 — 데이터만 교체하라.", x: 50, y: 12, w: 80 },
      { type: "dialogue", text: "이건 대사 말풍선.", x: 32, y: 70, w: 42, tail: "down" }
    ]
  },
  {
    src: "../../05_panels/ep{NN}/panel_002.png",
    alt: "panel 002",
    bubbles: [
      { type: "thought", text: "이건 생각...", x: 68, y: 30, w: 40 },
      { type: "shout", text: "외침!!", x: 50, y: 80, w: 36, tail: "left" }
    ]
  }
];

/* ===== 렌더러 ===== */
function el(tag, cls, txt){ const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }

function renderBubble(b){
  const node = el("div", "bubble " + (b.type||"dialogue"));
  node.style.left = (b.x ?? 50) + "%";
  node.style.top  = (b.y ?? 50) + "%";
  if (b.w) node.style.maxWidth = b.w + "%";
  node.appendChild(document.createTextNode(b.text||""));
  if (b.tail && b.tail !== "none") node.appendChild(el("span", "tail " + b.tail));
  return node;
}

function renderPanel(p, i){
  const panel = el("div", "panel");
  const img = new Image();
  img.loading = "lazy";              // 긴 회차 성능을 위한 지연 로드
  img.decoding = "async";
  img.alt = p.alt || ("panel " + String(i+1).padStart(3,"0"));
  img.src = p.src;
  img.onerror = () => {              // 결손/0바이트 PNG는 칸을 비우지 않고 표시
    const ph = el("div", "missing", "⚠ 패널 이미지 누락/손상: " + p.src);
    img.replaceWith(ph);
  };
  panel.appendChild(img);
  (p.bubbles||[]).forEach(b => panel.appendChild(renderBubble(b)));
  return panel;
}

(function init(){
  document.title = META.title + " — " + META.episode;
  document.getElementById("m-title").textContent = META.title;
  document.getElementById("m-ep").textContent = META.episode;
  const strip = document.getElementById("strip");
  PANELS.forEach((p,i) => strip.appendChild(renderPanel(p,i)));
  document.getElementById("foot").textContent =
    "총 " + PANELS.length + " 패널 · 끝까지 스크롤하세요";
})();
</script>
</body>
</html>
